<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirPulse — City Detail</title>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <span class="logo">🌬️ AirPulse</span>
  <a href="index.html">Dashboard</a>
  <a href="rankings.html">Rankings</a>
  <a href="/docs" target="_blank">API Docs</a>
</nav>

<div class="container">
  <a href="rankings.html" style="font-size:.85rem;color:var(--muted);text-decoration:none">← Back to Rankings</a>

  <h1 class="page-title mt-2" id="city-title">Loading…</h1>
  <p id="city-country" style="color:var(--muted);margin-bottom:1.5rem"></p>

  <!-- Current metrics -->
  <div class="metrics-grid" id="metrics-grid">
    <div class="card metric-card">
      <div class="metric-label">Current AQI</div>
      <div class="metric-value" id="m-aqi">—</div>
      <div class="metric-unit" id="m-category"></div>
    </div>
    <div class="card metric-card">
      <div class="metric-label">PM2.5</div>
      <div class="metric-value" id="m-pm25">—</div>
      <div class="metric-unit">µg/m³</div>
    </div>
    <div class="card metric-card">
      <div class="metric-label">Temperature</div>
      <div class="metric-value" id="m-temp">—</div>
      <div class="metric-unit">°C</div>
    </div>
    <div class="card metric-card">
      <div class="metric-label">Humidity</div>
      <div class="metric-value" id="m-humidity">—</div>
      <div class="metric-unit">%</div>
    </div>
    <div class="card metric-card">
      <div class="metric-label">Wind Speed</div>
      <div class="metric-value" id="m-wind">—</div>
      <div class="metric-unit">m/s</div>
    </div>
    <div class="card metric-card">
      <div class="metric-label">Pressure</div>
      <div class="metric-value" id="m-pressure">—</div>
      <div class="metric-unit">hPa</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="card chart-card">
      <canvas id="chart-aqi"></canvas>
    </div>
    <div class="card chart-card">
      <canvas id="chart-weather"></canvas>
    </div>
    <div class="card chart-card">
      <canvas id="chart-wind"></canvas>
    </div>
    <div class="card" id="corr-card">
      <h3 style="font-size:.95rem;font-weight:600;margin-bottom:1rem">
        AQI ↔ Weather Correlations (30 days)
      </h3>
      <div id="corr-content"><div class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<script src="js/charts.js"></script>
<script>
const API = "/api/v1";

function aqiCategory(aqi) {
  if (!aqi) return "Unknown";
  if (aqi <= 50)  return "Good";
  if (aqi <= 100) return "Moderate";
  if (aqi <= 150) return "Unhealthy for Sensitive Groups";
  if (aqi <= 200) return "Unhealthy";
  if (aqi <= 300) return "Very Unhealthy";
  return "Hazardous";
}
function aqiColor(aqi) {
  if (!aqi) return "#9e9e9e";
  if (aqi <= 50)  return "#4caf50";
  if (aqi <= 100) return "#ffeb3b";
  if (aqi <= 150) return "#ff9800";
  if (aqi <= 200) return "#f44336";
  if (aqi <= 300) return "#9c27b0";
  return "#7b1fa2";
}

function corrBar(label, value) {
  if (value === null || value === undefined) {
    return `<div class="corr-row">
      <span class="corr-label">${label}</span>
      <span style="color:var(--muted);font-size:.8rem">Not enough data</span>
    </div>`;
  }
  // Map [-1,1] to [0,100]% width; anchor at 50%
  const pct   = Math.abs(value) * 50;
  const left  = value < 0;
  const color = value < -0.3 ? "#4caf50" : value > 0.3 ? "#f44336" : "#ffeb3b";
  return `<div class="corr-row">
    <span class="corr-label">${label}</span>
    <div class="corr-bar-wrap">
      <div class="corr-bar" style="
        width:${pct}%;
        background:${color};
        margin-left:${left ? 50 - pct : 50}%;
      "></div>
    </div>
    <span class="corr-val" style="color:${color}">${value.toFixed(2)}</span>
  </div>`;
}

async function loadCity() {
  const params = new URLSearchParams(location.search);
  const cityId = params.get("id");
  if (!cityId) { document.getElementById("city-title").textContent = "City not found"; return; }

  try {
    const [detailRes, aqRes, weatherRes, corrRes] = await Promise.all([
      fetch(`${API}/cities/${cityId}`),
      fetch(`${API}/cities/${cityId}/air-quality?hours=48`),
      fetch(`${API}/cities/${cityId}/weather?hours=48`),
      fetch(`${API}/cities/${cityId}/correlation?days=30`),
    ]);

    const detail  = await detailRes.json();
    const aqData  = await aqRes.json();
    const wData   = await weatherRes.json();
    const corrData = await corrRes.json();

    // Header
    document.getElementById("city-title").textContent = detail.city.name;
    document.getElementById("city-country").textContent = detail.city.country;
    document.title = `AirPulse — ${detail.city.name}`;

    // Metrics
    const aq = detail.latest_air_quality;
    const w  = detail.latest_weather;
    if (aq) {
      const cat = aqiCategory(aq.aqi);
      document.getElementById("m-aqi").textContent = aq.aqi ?? "—";
      document.getElementById("m-aqi").style.color = aqiColor(aq.aqi);
      document.getElementById("m-category").textContent = cat;
      document.getElementById("m-pm25").textContent = aq.pm25 ?? "—";
    }
    if (w) {
      document.getElementById("m-temp").textContent     = w.temperature ?? "—";
      document.getElementById("m-humidity").textContent = w.humidity ?? "—";
      document.getElementById("m-wind").textContent     = w.wind_speed ?? "—";
      document.getElementById("m-pressure").textContent = w.pressure ?? "—";
    }

    // Charts
    renderAqiChart("chart-aqi", aqData);
    renderWeatherChart("chart-weather", wData);
    renderWindChart("chart-wind", wData);

    // Correlations
    document.getElementById("corr-content").innerHTML = [
      corrBar("Temperature", corrData.temperature_correlation),
      corrBar("Humidity",    corrData.humidity_correlation),
      corrBar("Wind Speed",  corrData.wind_speed_correlation),
      corrBar("Pressure",    corrData.pressure_correlation),
      `<div style="font-size:.75rem;color:var(--muted);margin-top:.75rem">
        Based on ${corrData.data_points} paired observations.
        Negative r = higher metric → cleaner air.
      </div>`,
    ].join("");

  } catch (err) {
    document.getElementById("city-title").textContent = "Error loading city";
    console.error(err);
  }
}

document.addEventListener("DOMContentLoaded", loadCity);
</script>
</body>
</html>
