version: "3.9"

# ─── PRODUCTION ENVIRONMENT ──────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    # No volume mount — code is baked into the image at build time

  db:
    image: postgres:15-alpine
    env_file: .env.prod
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data   # persistent storage!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
